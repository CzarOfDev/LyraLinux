---
dontChroot: false
timeout: 120
script:
    # Удалить live-пользователя lyra (целевой юзер создан модулем users отдельно)
    - "userdel -r lyra 2>/dev/null || true"
    # Живой sudoers live-режима (если вдруг приехал)
    - "rm -f /etc/sudoers.d/00-lyra-live"
    # Полностью выключить автологин LightDM
    - "sed -i '/^autologin-user=/d; /^autologin-user-timeout=/d; /^autologin-session=/d' /etc/lightdm/lightdm.conf"
    # Хвосты archiso
    - "rm -f /root/.zlogin /root/.automated_script.sh"
    - "rm -rf /etc/systemd/system/getty@tty1.service.d"
    # Ярлык установщика — не нужен на установленной системе
    - "rm -f /usr/share/applications/install-lyra.desktop"
    - "rm -f /etc/skel/Desktop/install-lyra.desktop"
    - "rm -f /home/*/Desktop/install-lyra.desktop"
