<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480">
  <defs>
    <radialGradient id="bg" cx="0.30" cy="0.22" r="0.95">
      <stop offset="0%"   stop-color="#333a4d"/>
      <stop offset="45%"  stop-color="#1c2030"/>
      <stop offset="100%" stop-color="#06070b"/>
    </radialGradient>

    <!-- Звезда: объём как у арчевского лого — светлее сверху, темнее снизу -->
    <linearGradient id="star" x1="0.25" y1="0" x2="0.75" y2="1">
      <stop offset="0%"   stop-color="#e2e8fd"/>
      <stop offset="40%"  stop-color="#b8c6f5"/>
      <stop offset="100%" stop-color="#7d94e8"/>
    </linearGradient>

    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#8fa6ee" stop-opacity="0.30"/>
      <stop offset="60%"  stop-color="#8fa6ee" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8fa6ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="640" height="480" fill="url(#bg)"/>

  <g>
    <circle cx="90" cy="80" r="95" fill="url(#halo)"/>

    <path d="M 90,8
             Q 99,71 152,80
             Q 99,89 90,152
             Q 81,89 28,80
             Q 81,71 90,8 Z"
          fill="url(#star)"/>

    <circle cx="38"  cy="27"  r="3.5" fill="#b8c6f5" opacity="0.85"/>
    <circle cx="146" cy="34"  r="5"   fill="#8fa6ee" opacity="0.9"/>
    <circle cx="36"  cy="132" r="5"   fill="#8fa6ee" opacity="0.9"/>
  </g>

  <g font-family="DejaVu Sans" font-weight="bold" font-size="76">
    <text x="172" y="103" fill="#ffffff" letter-spacing="-1">Lyra</text>
    <text x="343" y="103" fill="#8fa6ee" letter-spacing="-1" font-weight="normal">Linux</text>
  </g>
</svg>
